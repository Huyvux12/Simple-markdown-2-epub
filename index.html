<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md2Epub - Chuyển đổi Markdown sang EPUB</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Browser execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Libraries for EPUB generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Templates ---
        const createContainerXml = () => `<?xml version="1.0"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`;
        const createCss = () => `body { font-family: "serif"; margin: 0; padding: 1em; line-height: 1.6; } h1 { text-align: center; color: #333; } p { text-indent: 1em; margin-bottom: 0.5em; text-align: justify; }`;
        
        const createOpf = (metadata, manifestItems, spineItems) => `<?xml version="1.0" encoding="utf-8"?>
<package xmlns="http://www.idpf.org/2007/opf" unique-identifier="BookId" version="2.0">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:opf="http://www.idpf.org/2007/opf">
    <dc:title>${metadata.title}</dc:title>
    <dc:creator opf:role="aut">${metadata.author}</dc:creator>
    <dc:language>vi</dc:language>
    <dc:identifier id="BookId" opf:scheme="UUID">urn:uuid:${crypto.randomUUID()}</dc:identifier>
  </metadata>
  <manifest><item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/><item id="style" href="Styles/style.css" media-type="text/css"/>${manifestItems}</manifest>
  <spine toc="ncx">${spineItems}</spine>
</package>`;

        const createNcx = (metadata, navPoints) => `<?xml version="1.0" encoding="UTF-8"?>
<ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
  <docTitle><text>${metadata.title}</text></docTitle>
  <navMap>${navPoints}</navMap>
</ncx>`;

        function App() {
            const [files, setFiles] = useState([]);
            const [metadata, setMetadata] = useState({ title: "Truyện Mới", author: "Tác Giả" });
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [log, setLog] = useState("");

            const handleFileSelect = (e) => {
                const selected = Array.from(e.target.files).filter(f => f.name.endsWith('.md') || f.name.endsWith('.txt'));
                setFiles(prev => [...prev, ...selected]);
            };

            const sortFiles = () => {
                const sorted = [...files].sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
                setFiles(sorted);
            };

            const generateEpub = async () => {
                setIsProcessing(true);
                setProgress(0);
                try {
                    const zip = new JSZip();
                    zip.file("mimetype", "application/epub+zip", { compression: "STORE" });
                    zip.folder("META-INF").file("container.xml", createContainerXml());
                    const oebps = zip.folder("OEBPS");
                    oebps.folder("Styles").file("style.css", createCss());
                    const textFolder = oebps.folder("Text");

                    let manifest = ""; let spine = ""; let nav = "";

                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        const title = file.name.replace(/\.(md|txt)$/i, "");
                        const content = await file.text();
                        const html = marked.parse(content);
                        const fileName = `chap_${i+1}.xhtml`;
                        
                        textFolder.file(fileName, `<?xml version="1.0" encoding="utf-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>${title}</title><link rel="stylesheet" href="../Styles/style.css"/></head><body><h1>${title}</h1>${html}</body></html>`);
                        
                        manifest += `<item id="c${i}" href="Text/${fileName}" media-type="application/xhtml+xml"/>`;
                        spine += `<itemref idref="c${i}"/>`;
                        nav += `<navPoint id="n${i}" playOrder="${i+1}"><navLabel><text>${title}</text></navLabel><content src="Text/${fileName}"/></navPoint>`;
                        
                        setProgress(Math.round(((i + 1) / files.length) * 100));
                        setLog(`Đang xử lý: ${file.name}`);
                        if (i % 20 === 0) await new Promise(r => setTimeout(r, 0));
                    }

                    oebps.file("content.opf", createOpf(metadata, manifest, spine));
                    oebps.file("toc.ncx", createNcx(metadata, nav));

                    const blob = await zip.generateAsync({ type: "blob" });
                    saveAs(blob, `${metadata.title || 'ebook'}.epub`);
                    setLog("Hoàn tất!");
                } catch (e) { setLog("Lỗi: " + e.message); }
                setIsProcessing(false);
            };

            return (
                <div className="max-w-3xl mx-auto my-10 p-6 bg-white shadow-2xl rounded-2xl">
                    <header className="flex items-center gap-4 mb-8 text-indigo-700">
                        <i data-lucide="book" className="w-10 h-10"></i>
                        <h1 className="text-3xl font-extrabold">Md2Epub</h1>
                    </header>

                    <div className="grid grid-cols-2 gap-4 mb-6">
                        <input type="text" placeholder="Tên sách" className="p-3 border rounded-lg outline-indigo-500" value={metadata.title} onChange={e => setMetadata({...metadata, title: e.target.value})} />
                        <input type="text" placeholder="Tác giả" className="p-3 border rounded-lg outline-indigo-500" value={metadata.author} onChange={e => setMetadata({...metadata, author: e.target.value})} />
                    </div>

                    <div className="border-4 border-dashed p-10 text-center rounded-xl hover:bg-slate-50 cursor-pointer relative mb-6">
                        <input type="file" multiple accept=".md,.txt" onChange={handleFileSelect} className="absolute inset-0 opacity-0 cursor-pointer" />
                        <i data-lucide="upload-cloud" className="w-12 h-12 mx-auto text-slate-400 mb-2"></i>
                        <p className="text-slate-600 font-medium">Nhấn để chọn hàng loạt file chương truyện</p>
                    </div>

                    {files.length > 0 && (
                        <div className="mb-6 bg-slate-100 rounded-lg p-4">
                            <div className="flex justify-between items-center mb-2">
                                <span className="font-bold">{files.length} file đã chọn</span>
                                <button onClick={sortFiles} className="bg-white px-3 py-1 rounded shadow text-sm flex items-center gap-1 hover:bg-indigo-50">
                                    <i data-lucide="sort-asc" className="w-4 h-4"></i> Sắp xếp tự nhiên
                                </button>
                            </div>
                            <div className="max-h-40 overflow-y-auto custom-scrollbar text-xs text-slate-500">
                                {files.map((f, i) => <div key={i} className="py-1 border-b border-slate-200">{f.name}</div>)}
                            </div>
                        </div>
                    )}

                    {isProcessing ? (
                        <div className="space-y-2">
                            <div className="flex justify-between text-sm italic text-indigo-600"><span>{log}</span><span>{progress}%</span></div>
                            <div className="w-full bg-slate-200 h-3 rounded-full overflow-hidden">
                                <div className="bg-indigo-600 h-full transition-all" style={{width: progress+'%'}}></div>
                            </div>
                        </div>
                    ) : (
                        <button onClick={generateEpub} disabled={files.length===0} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 disabled:bg-slate-300 shadow-lg">
                            Bắt đầu chuyển đổi & Tải về
                        </button>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize Lucide icons after React renders
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
